<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 140" role="img" aria-label="Logo Manga Paradise">
  <defs>
    <linearGradient id="mpRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4256" />
      <stop offset="100%" stop-color="#c0262f" />
    </linearGradient>
  </defs>

  <!-- Pastille ronde avec idéogramme stylisé (M) -->
  <g transform="translate(70 70)">
    <circle r="54" fill="url(#mpRed)" stroke="#1a1a1a" stroke-width="3" />
    <!-- M stylisé manga -->
    <path d="M -26 22 L -26 -22 L -10 22 L 10 -22 L 26 22"
          fill="none" stroke="#f5e6c8" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Petit accent étoile -->
    <path d="M 28 -24 l 4 -2 l -1 4 l 4 1 l -4 1 l 1 4 l -4 -2 l -4 2 l 1 -4 l -4 -1 l 4 -1 l -1 -4 z"
          fill="#d4af37" stroke="#1a1a1a" stroke-width="0.8" />
  </g>

  <!-- Texte -->
  <g transform="translate(148 62)">
    <text font-family="Georgia, 'Times New Roman', serif"
          font-size="32" font-weight="800"
          fill="#1a1a1a" letter-spacing="2">
      MANGA<tspan fill="#e63946">&#160;PARADISE</tspan>
    </text>
    <text y="28" font-family="Georgia, serif" font-size="12" font-weight="600"
          fill="#d4af37" letter-spacing="10">
      ★ ASSOCIATION LOI 1901 ★
    </text>
  </g>
</svg>
